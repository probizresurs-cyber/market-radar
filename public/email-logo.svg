<?xml version="1.0" encoding="UTF-8"?>
<!--
  MarketRadar email logo — static (без анимаций) для совместимости со
  всеми email-клиентами. Размер viewBox 64x64 совпадает с MarketRadarLogo
  компонентом из платформы.

  Используется через <img src="https://marketradar24.ru/email-logo.svg">
  в шапке email-шаблонов.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="email-logo-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="email-logo-blade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="32" cy="32" r="30" fill="url(#email-logo-glow)"/>

  <!-- Concentric rings -->
  <circle cx="32" cy="32" r="28" stroke="#1A3F5C" stroke-width="0.8" fill="none" opacity="0.6"/>
  <circle cx="32" cy="32" r="20" stroke="#1A3F5C" stroke-width="0.8" fill="none" opacity="0.6"/>
  <circle cx="32" cy="32" r="12" stroke="#1A3F5C" stroke-width="0.8" fill="none" opacity="0.6"/>

  <!-- Network connections -->
  <g opacity="0.5">
    <line x1="32" y1="32" x2="48" y2="18" stroke="#00D4FF" stroke-width="0.6" stroke-dasharray="4 4"/>
    <line x1="32" y1="32" x2="20" y2="22" stroke="#00D4FF" stroke-width="0.6" stroke-dasharray="4 4"/>
    <line x1="32" y1="32" x2="44" y2="46" stroke="#00D4FF" stroke-width="0.6" stroke-dasharray="4 4"/>
    <line x1="32" y1="32" x2="18" y2="42" stroke="#00D4FF" stroke-width="0.6" stroke-dasharray="4 4"/>
    <line x1="48" y1="18" x2="44" y2="46" stroke="#00D4FF" stroke-width="0.5" opacity="0.7" stroke-dasharray="4 4"/>
    <line x1="20" y1="22" x2="18" y2="42" stroke="#00D4FF" stroke-width="0.5" opacity="0.7" stroke-dasharray="4 4"/>
  </g>

  <!-- Network nodes — coloured (data sources) -->
  <circle cx="48" cy="18" r="2.5" fill="#00FF94"/>
  <circle cx="20" cy="22" r="2.5" fill="#00D4FF"/>
  <circle cx="44" cy="46" r="2.5" fill="#9B59FF"/>
  <circle cx="18" cy="42" r="2.5" fill="#00D4FF"/>

  <!-- Distant nodes -->
  <circle cx="54" cy="34" r="1" fill="#00D4FF" opacity="0.5"/>
  <circle cx="10" cy="30" r="1" fill="#00D4FF" opacity="0.5"/>
  <circle cx="32" cy="8" r="1" fill="#00D4FF" opacity="0.5"/>

  <!-- Radar sweep (static position — ~30°) -->
  <path d="M 32 32 L 60 32 A 28 28 0 0 0 52 12 Z" fill="url(#email-logo-blade)"/>

  <!-- Core hub -->
  <circle cx="32" cy="32" r="3.5" fill="#00D4FF"/>
  <circle cx="32" cy="32" r="5" stroke="#00D4FF" stroke-width="0.5" fill="none" opacity="0.4"/>
</svg>
